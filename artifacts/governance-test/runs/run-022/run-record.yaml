known_limitations:
  - id: "LIM-022-01"
    description: >
      RE_CDC_INTENT fires on explicit CDC/multi-clock keywords only. Tasks that imply
      multi-clock behavior without these keywords (e.g. 'interface between a 100MHz module
      and a 200MHz module') do not trigger Rule 5. Same class as LIM-010-01 (FSM) and LIM-019-01
      (ASSIGNMENT_SEMANTICS).
    severity: "advisory"
  - id: "LIM-022-02"
    description: >
      Semantic negation not handled: task text containing CDC strategy keywords in a negated
      context (e.g. 'CDC strategy has not been provided') can cause false-negative triggering
      of RE_CDC_STRATEGY. Smoke case texts are written to avoid this class of input.
      Same class as general validator semantic-negation limitation.
    severity: "advisory"

