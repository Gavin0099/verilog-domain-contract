name: Governance Drift

on:
  push:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "governance/**"
      - "schemas/**"
      - "scripts/**"
      - "docs/**"
  pull_request:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "governance/**"
      - "schemas/**"
      - "scripts/**"
      - "docs/**"
  workflow_dispatch:

jobs:
  governance-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Init top-level submodule (non-recursive)
        run: git submodule update --init additional/ai-governance-framework

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install pyyaml

      - name: Run governance drift check
        run: |
          python additional/ai-governance-framework/governance_tools/governance_drift_checker.py \
            --repo . \
            --framework-root additional/ai-governance-framework \
            --format human

          python additional/ai-governance-framework/governance_tools/governance_drift_checker.py \
            --repo . \
            --framework-root additional/ai-governance-framework \
            --format json > drift-result.json

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("drift-result.json").read_text(encoding="utf-8"))
          severity = (payload.get("severity") or "").lower()

          if severity == "critical":
              print("Governance drift severity=critical -> failing workflow.")
              sys.exit(1)

          if severity == "warning":
              print("::notice::Governance drift severity=warning (non-blocking).")
          else:
              print("Governance drift severity=ok.")
          PY

      - name: Run readiness audit
        run: python additional/ai-governance-framework/governance_tools/readiness_audit.py --repo . --format human

      - name: Run quickstart smoke
        run: python additional/ai-governance-framework/governance_tools/quickstart_smoke.py --project-root . --plan PLAN.md --contract contract.yaml --format human

      - name: Emit deterministic governance artifacts
        run: |
          ARTIFACT_TAG="$(date -u +%F)"
          python scripts/run_precondition_gate.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/run_behavioral_replay.py --artifact-tag "$ARTIFACT_TAG" --format yaml
          python scripts/run_claim_enforcement.py --artifact-tag "$ARTIFACT_TAG" --format json
          python scripts/build_governance_closeout_summary.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/build_governance_closeout_report.py --artifact-tag "$ARTIFACT_TAG"
          python scripts/check_governance_closeout_schema.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_reviewer_checklist.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_reviewer_verdict_schema.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/build_governance_bundle_manifest.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_governance_bundle_manifest_schema.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/build_governance_release_handoff.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_governance_release_handoff_schema.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_reviewer_handoff_consistency.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_reviewer_handoff_consistency_schema.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/build_governance_release_handoff.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/run_runtime_hook_smoke.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_runtime_hook_smoke_schema.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_governance_aggregate_coherence.py --artifact-tag "$ARTIFACT_TAG" --format human
          python scripts/check_governance_aggregate_coherence_schema.py --artifact-tag "$ARTIFACT_TAG" --format human

      - name: Upload precondition artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-precondition-artifacts
          path: |
            artifacts/precondition-gate/*
            artifacts/schema-conformance/*-precondition-gate-conformance.json

      - name: Upload replay artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-replay-artifacts
          path: |
            artifacts/replay-results/*
            artifacts/schema-conformance/*-validator-replay-conformance.json

      - name: Upload claim artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-claim-artifacts
          path: |
            artifacts/claim-enforcement/checker-tests/*
            artifacts/schema-conformance/*-claim-enforcement-conformance.json

      - name: Upload closeout artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-closeout-artifacts
          path: |
            artifacts/closeout/*-governance-closeout-summary.json
            artifacts/closeout/*-governance-closeout-summary.md
            artifacts/closeout/*-governance-release-handoff.json
            artifacts/governance/*-runtime-hook-smoke.json
            artifacts/governance/*-aggregate-coherence.json
            artifacts/schema-conformance/*-governance-closeout-summary-conformance.json
            artifacts/schema-conformance/*-governance-closeout-report-conformance.json
            artifacts/schema-conformance/*-governance-release-handoff-conformance.json
            artifacts/schema-conformance/*-runtime-hook-smoke-conformance.json
            artifacts/schema-conformance/*-aggregate-coherence-conformance.json

      - name: Upload reviewer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-reviewer-artifacts
          path: |
            artifacts/closeout/*-reviewer-checklist-verdict.json
            artifacts/closeout/*-governance-bundle-manifest.json
            artifacts/schema-conformance/*-reviewer-checklist-verdict-conformance.json
            artifacts/schema-conformance/*-governance-bundle-manifest-conformance.json
            artifacts/governance/*-reviewer-handoff-consistency.json
            artifacts/schema-conformance/*-reviewer-handoff-consistency-conformance.json
