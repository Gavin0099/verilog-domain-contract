schema_version: "0.1"
name: deterministic-governance-suite
description: Common artifact envelope for deterministic repo-local governance runners such as behavioral replay and claim enforcement.

top_level_fields:
  - schema_version
  - name
  - artifact_family
  - suite_id
  - generated_at
  - execution_surface
  - cases
  - summary
  - note

case_fields:
  - case_id
  - case_type
  - rule_family
  - status
  - preconditions_met
  - expected
  - observed
  - checks
  - notes

summary_fields:
  - total
  - pass
  - fail
  - not_executed
