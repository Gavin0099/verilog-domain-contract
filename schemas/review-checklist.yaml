schema_version: "0.2"
name: verilog-rtl-review-checklist
description: Reviewer checklist for decision-affecting Verilog / RTL governance constraints.

sections:
  - id: reset_contract
    required: true
    items:
      - id: RESET_DEFINED
        question: Is reset polarity explicitly defined?
        severity: high
      - id: RESET_TYPE_DEFINED
        question: Is reset type (sync or async) explicitly defined?
        severity: high
      - id: RESET_ASSUMPTION_DISCLOSED
        question: If reset is assumed, is the assumption explicitly documented?
        severity: high
      - id: RESET_COMPLETION_CLAIM
        question: Is completion claimed without reset definition?
        severity: critical

  - id: assignment_contract
    required: true
    items:
      - id: ASSIGNMENT_INTENT_CLEAR
        question: Is sequential vs combinational intent explicitly partitioned?
        severity: high
      - id: ASSIGNMENT_OPERATOR_MATCH
        question: Are assignment operators consistent with intended semantics?
        severity: high
      - id: ASSIGNMENT_MIXED_STATE_PATH
        question: Is blocking and non-blocking assignment mixed on a state path?
        severity: critical

  - id: handshake_contract
    required: true
    items:
      - id: HANDSHAKE_PROTOCOL_DEFINED
        question: Are protocol semantics (for example valid/ready or req/ack) explicit?
        severity: high
      - id: HANDSHAKE_BACKPRESSURE_DEFINED
        question: Is backpressure/acceptance behavior explicitly defined?
        severity: high
      - id: HANDSHAKE_LATENCY_DEFINED
        question: Is latency/timing expectation explicitly defined?
        severity: high
      - id: HANDSHAKE_COMPLETION_CLAIM
        question: Is implementation claimed complete without handshake timing definition?
        severity: critical

  - id: fsm_contract
    required: true
    items:
      - id: FSM_STATE_MODEL_DEFINED
        question: Is the FSM state model or state set explicitly defined?
        severity: high
      - id: FSM_DECOMPOSITION_DEFINED
        question: Is FSM decomposition style explicitly defined?
        severity: high
      - id: FSM_ILLEGAL_STATE_DEFINED
        question: Is illegal-state handling explicitly defined?
        severity: high
      - id: FSM_COMPLETION_CLAIM
        question: Is implementation claimed complete without explicit FSM contract details?
        severity: critical

  - id: cdc_contract
    required: true
    items:
      - id: CDC_MULTI_CLOCK_DETECTED
        question: Does the task imply multiple clock domains or domain crossings?
        severity: high
      - id: CDC_STRATEGY_DEFINED
        question: Is the CDC strategy explicitly defined without negated wording such as not specified or TBD?
        severity: critical
      - id: CDC_SYNCHRONIZER_DEFINED
        question: Is the synchronizer or crossing scheme explicitly defined?
        severity: critical
      - id: CDC_COMPLETION_CLAIM
        question: Is implementation or verified completion claimed without CDC strategy definition?
        severity: critical

  - id: governance_closeout
    required: true
    items:
      - id: CLOSEOUT_PRECONDITION_SUMMARY_PRESENT
        question: Is a precondition-gate closeout summary artifact present and passing?
        severity: high
      - id: CLOSEOUT_PRECONDITION_COVERAGE_PRESENT
        question: Does the precondition-gate closeout surface expose grouped coverage for negation, boundary, and positive cases?
        severity: high
      - id: CLOSEOUT_REPLAY_SUMMARY_PRESENT
        question: Is a behavioral replay closeout summary artifact present and passing?
        severity: high
      - id: CLOSEOUT_CLAIM_SUMMARY_PRESENT
        question: Is a claim-enforcement closeout summary artifact present and passing?
        severity: high
      - id: CLOSEOUT_SCHEMA_CONFORMANCE_PRESENT
        question: Are schema conformance artifacts present for both deterministic governance surfaces?
        severity: high
      - id: CLOSEOUT_AGGREGATE_PRESENT
        question: Is the aggregate governance closeout summary present and schema-conformance clean?
        severity: critical
