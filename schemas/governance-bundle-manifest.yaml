schema_version: "0.1"
name: governance-bundle-manifest
description: Machine-readable index of reviewer-facing governance artifact bundles for one artifact tag.

fields:
  - schema_version
  - name
  - artifact_tag
  - bundles

bundle_fields:
  - bundle_name
  - purpose
  - files

expected_bundle_names:
  - governance-precondition-artifacts
  - governance-replay-artifacts
  - governance-claim-artifacts
  - governance-closeout-artifacts
  - governance-reviewer-artifacts
