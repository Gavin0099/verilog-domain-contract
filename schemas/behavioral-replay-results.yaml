schema_version: "0.1"
name: behavioral-replay-results
description: Structured results schema for BR-* replay runs, including BR-001 through BR-007 and future extensions.
extends: schemas/deterministic-governance-suite.yaml

fields:
  - schema_version
  - name
  - artifact_family
  - suite_id
  - generated_at
  - execution_surface
  - note
  - cases
  - summary

case_fields:
  - case_id
  - case_type
  - rule_family
  - status
  - preconditions_met
  - expected
  - observed
  - checks
  - notes
  - output_mode
  - refused_or_downgraded
  - error_detected
  - claim_violation
  - disclosure_complete
  - calibration_label

summary_fields:
  - total
  - pass
  - fail
  - not_executed
